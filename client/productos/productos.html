<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/icon">
    <script src="../util/theme.js"></script>
    <title>FRS Gaming</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    
    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
          <img
            src="../images/icono.png"
            alt="Logo"
            width="30"
            height="30"
            class="d-inline-block align-text-top"
          />
          FRS Gaming
        </a>
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-2" onclick="cambiarTema()">
            <span class="material-symbols-outlined d-flex">invert_colors</span>
          </button>
          <button type="button" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-2">
            <a class="nav-link" href="../carrito/carrito.html">Carrito <span class="badge bg-secondary">0</span></a>
          </button>
        </div>
      </div>
    </nav>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="container my-5">
      
      <!-- DESCRIPCIÓN DE LA PANTALLA -->
      <section class="text-center mb-5">
        <h1 class="fw-bold">Catálogo</h1>
        <p class="text-muted">Seleccioná una categoría y agrega productos al carrito</p>
      </section>

      <!-- PESTAÑAS DE CATEGORÍAS -->
      <ul id="tablas-categoria" class="nav nav-tabs mb-4">
        <li class="nav-item">
          <a class="nav-link active" data-categoria="consolas" href="#">CONSOLAS</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-categoria="videojuegos" href="#">VIDEOJUEGOS</a>
        </li>
      </ul>

      <!-- EXPOSICIÓN DE PRODUCTOS -->
      <div id="contenedor-productos" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4 mb-5">
        <!-- ACÁ VAN TODOS LOS PRODUCTOS DISPONIBLES -->
      </div>

      <!-- PAGINACIÓN -->
      <nav aria-label="Navegación de páginas" class="d-flex justify-content-center mb-5">
        <span id="texto-pagina" class="text-muted small container"></span>
        <button id="btn-anterior" class="btn btn-outline-secondary btn-sm">Anterior</button>
        <button id="btn-siguiente" class="btn btn-outline-secondary btn-sm">Siguiente</button>
      </nav>

    </main>

    <!-- FOOTER -->
    <footer class="bg-body-tertiary border-top py-4 text-center">
      <div class="container">
        <p class="text-muted small mb-0">
          Franco Ferreandi - Augusto Rodriguez - Luciano Sparta | Programación III - 2026
        </p>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="main.js"></script>
  </body>
</html>
