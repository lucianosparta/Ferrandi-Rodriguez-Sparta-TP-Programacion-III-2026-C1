<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../images/favicon.ico" type="image/icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>FRS Gaming</title>
</head>
<body class="bg-gradiente min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card border-purple p-4 p-md-5 welcome-card">
        <div class="mx-auto mb-4 d-flex align-items-center justify-content-center flex-column text-purple-muted">
            <img src="../../images/icono.png" alt="Logo de la tienda">
        </div>
        <h1 class="title text-white text-center mb-1">Bienvenidos a<br>FRS Gaming</h1>
        <p class="text-purple text-center text-uppercase fw-semibold mb-4 ls fs">Tu tienda de confianza</p>
        <h2 class="text-purple-muted text-center fw-semibold mb-3 fs">Por favor, ingresá un nombre para continuar:</h2>
        <div class="px-1">
            <input type="text" class="form-control name-input bg-black text-white border-secondary mb-3" placeholder="Tu nombre aquí..." id="client-name" autocomplete="off">
            <button class="btn btn-purple w-100 fw-bold text-uppercase ls">Ingresar</button>
            <!-- onclik="enter()"-->
        </div>
        <p class="text-center mt-4 mb-0 text-secondary fs">Ferrandi Rodriguez Sparta - Programación III</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <!-- <script src="main.js"></script> -->
</body>
</html>
