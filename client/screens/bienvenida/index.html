<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../images/favicon.ico" type="image/icon">
    <script src="theme.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>FRS Gaming</title>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <img src="../../images/icono.png" alt="Logo" width="30" height="30" class="d-inline-block align-text-top"/>
                <strong>FRS Gaming</strong> 
            </a>
            <div class="d-flex gap-2">
                <button type="button" id="theme" class="btn btn-purple btn-sm" onclick="cambiarTema()">
                    <span class="material-symbols-outlined d-flex">invert_colors</span>
                </button>
                <button type="button" class="btn btn-purple btn-sm"><a href="../login/index.html">Admin</a></button>
            </div>
        </div>
    </nav>
    <main id="main-bienvenida" class="bg-gradiente-light d-flex align-items-center justify-content-center">
        <div id="card" class="card border-purple p-4 welcome-card-ligth">
            <div class="mx-auto mb-4 d-flex align-items-center justify-content-center flex-column text-purple-muted">
                <img src="../../images/icono.png" alt="Logo de la tienda">
            </div>
            <h1 id="h1-title" class="title text-black text-center mb-1">Bienvenidos a<br>FRS Gaming</h1>
            <h2 class="text-purple-muted text-center fw-semibold mb-3 fs">Por favor, ingresá un nombre para continuar:</h2>
            <div class="px-1">
                <input type="text" class="form-control name-input bg-white text-black border-secondary mb-3" placeholder="Tu nombre aquí..." id="client-name" autocomplete="off">
                <span class="text-danger d-none mt-1 field-error fs mb-2" id="name-error"></span>
                <button class="btn btn-purple w-100 fw-bold text-uppercase ls" onclick="enter()">Ingresar</button>
            </div>
        </div>
    </main>
    <footer class="bg-body-tertiary border-top py-4 text-center">
        <div class="container">
            <p class="text-muted small mb-0">
            Franco Ferrandi - Augusto Rodriguez - Luciano Sparta | Programación III - 2026
            </p>
        </div>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
