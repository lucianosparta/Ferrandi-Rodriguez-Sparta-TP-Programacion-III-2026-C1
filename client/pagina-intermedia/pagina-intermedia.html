<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRS Gaming - Pago</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet" 
  >
  <link rel="stylesheet" href="pagina-intermedia.css">
</head>

<body class="d-flex flex-column min-vh-100">
    
  <!-- BARRA DE NAVEGACIÓN -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2" href="../productos/productos.html">
        <img
          src="../images/logo.png"
          alt="Logo"
          width="30"
          height="30"
          class="d-inline-block align-text-top"
        />
        FRS Gaming
      </a>
    </div>
  </nav>

  <main class="container my-5 flex-grow-1">

    <div class="card mx-auto shadow-sm contenedor-pago">
      <div class="card-body p-4 p-md-5">
      <h2 class="fw-bold mb-4">
        Datos del comprador
      </h2>

      <!-- NOMBRE -->
      <div class="mb-3">
        <label class="form-label">Nombre</label>

        <input
          type="text"
          class="form-control"
          id="nombre"
        >
      </div>

      <!-- APELLIDO -->
      <div class="mb-4">
        <label class="form-label">Apellido</label>

        <input
          type="text"
          class="form-control"
          id="apellido"
        >
      </div>

      <!-- METODO DE PAGO -->
      <div class="mb-4">

        <label class="form-label fw-semibold">
          Método de pago
        </label>

        <select
          class="form-select"
          id="metodo-pago"
        >
          <option value="efectivo">
            Efectivo
          </option>

          <option value="tarjeta">
            Tarjeta
          </option>
        </select>

      </div>

      <!-- FORMULARIO TARJETA -->
      <div id="form-tarjeta" class="d-none">

        <h4 class="mb-4">
          Tarjeta de crédito o débito
        </h4>

        <div class="mb-3">

          <input
            type="text"
            class="form-control"
            placeholder="Número de tarjeta"
            id="numero-tarjeta"
          >

        </div>

        <div class="row">

          <div class="col-md-4 mb-3">

            <input
              type="text"
              class="form-control"
              placeholder="Titular"
              id="titular"
            >

          </div>

          <div class="col-md-4 mb-3">

            <input
              type="text"
              class="form-control"
              placeholder="Vencimiento (MM/AA)"
              id="vencimiento"
            >

          </div>

          <div class="col-md-4 mb-3">

            <input
              type="text"
              class="form-control"
              placeholder="CVV"
              id="cvv"
            >

          </div>

        </div>

        <div class="row">

          <div class="col-md-4 mb-3">

            <select class="form-select">
              <option>DNI</option>
            </select>

          </div>

          <div class="col-md-8 mb-3">

            <input
              type="text"
              class="form-control"
              placeholder="Documento del titular"
              id="documento"
            >

          </div>

        </div>

        <div class="mb-3">

          <input
            type="text"
            class="form-control"
            placeholder="Teléfono"
            id="telefono"
          >

        </div>

      </div>

      <!-- BOTON -->
        <form action="../ticket/ticket.html">
            <button
                class="btn btn-primary w-100 mt-4 fw-bold"
                id="realizar-pedido"
                disabled
            >
                Realizar pedido
            </button>
        </form>

    </div>
  </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-body-tertiary border-top py-4 text-center">
    <div class="container">
      <p class="text-muted small mb-0">
        Franco Ferrandi - Augusto Rodriguez - Luciano Sparta | Programación III - 2026
      </p>
    </div>
  </footer>

  <script src="pagina-intermedia.js"></script>

</body>
</html>
