<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pago</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="pagina-intermedia.css">
</head>

<body class="bg-light">

  <main class="container py-5">

    <div class="bg-white p-5 rounded-4 shadow-sm">

      <h2 class="fw-bold mb-4">
        Datos del comprador
      </h2>

      <!-- NOMBRE -->
      <div class="mb-3">
        <label class="form-label">Nombre</label>

        <input
          type="text"
          class="form-control"
          id="nombre"
        >
      </div>

      <!-- APELLIDO -->
      <div class="mb-4">
        <label class="form-label">Apellido</label>

        <input
          type="text"
          class="form-control"
          id="apellido"
        >
      </div>

      <!-- METODO DE PAGO -->
      <div class="mb-4">

        <label class="form-label fw-semibold">
          Método de pago
        </label>

        <select
          class="form-select"
          id="metodo-pago"
        >
          <option value="efectivo">
            Efectivo
          </option>

          <option value="tarjeta">
            Tarjeta
          </option>
        </select>

      </div>

      <!-- FORMULARIO TARJETA -->
      <div id="form-tarjeta" class="d-none">

        <h4 class="mb-4">
          Tarjeta de crédito o débito
        </h4>

        <div class="mb-3">

          <input
            type="text"
            class="form-control"
            placeholder="Número de tarjeta"
          >

        </div>

        <div class="row">

          <div class="col-md-4 mb-3">

            <input
              type="text"
              class="form-control"
              placeholder="Titular"
            >

          </div>

          <div class="col-md-4 mb-3">

            <input
              type="text"
              class="form-control"
              placeholder="Vencimiento (MM/AA)"
            >

          </div>

          <div class="col-md-4 mb-3">

            <input
              type="text"
              class="form-control"
              placeholder="CVV"
            >

          </div>

        </div>

        <div class="row">

          <div class="col-md-4 mb-3">

            <select class="form-select">
              <option>DNI</option>
            </select>

          </div>

          <div class="col-md-8 mb-3">

            <input
              type="text"
              class="form-control"
              placeholder="Documento del titular"
            >

          </div>

        </div>

        <div class="mb-3">

          <input
            type="text"
            class="form-control"
            placeholder="Teléfono"
          >

        </div>

      </div>

      <!-- BOTON -->
        <form action="../ticket/ticket.html">
            <button
                class="btn btn-success w-100 mt-4 fw-bold"
                id="realizar-pedido"
            >
                Realizar pedido
            </button>
        </form>

    </div>

  </main>

  <script src="pagina-intermedia.js"></script>

</body>
</html>
