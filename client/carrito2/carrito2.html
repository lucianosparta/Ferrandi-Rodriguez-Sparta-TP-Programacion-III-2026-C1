<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>FRS Gaming - Carrito</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
    <div class="container-fluid">

      <a class="navbar-brand d-flex align-items-center gap-2" href="../productos/productos.html">
        <img
          src="../images/logo.png"
          alt="Logo"
          width="30"
          height="30"
        />
        FRS Gaming
      </a>

      <button class="btn btn-outline-secondary">
        🛒 Carrito
      </button>

    </div>
  </nav>

  <!-- CONTENIDO -->
  <main class="container my-5 flex-grow-1">

    <h1 class="fw-bold mb-4">
      Carrito de compras
    </h1>
  
    <div class="table-responsive bg-white rounded-4 shadow-sm p-4">
  
      <table class="table align-middle">
  
        <thead>
  
          <tr>
  
            <th>Producto</th>
  
            <th>Precio</th>
  
            <th>Cantidad</th>
  
            <th>Sub total</th>
  
            <th></th>
  
          </tr>
  
        </thead>
  
        <tbody>
  
          <!-- PRODUCTO 1 -->
          <tr class="producto">
  
            <td>
              Nemesis Lockdown
            </td>
  
            <td class="precio">
              57.99
            </td>
  
            <td>
  
              <div class="d-flex align-items-center gap-2">
  
                <button class="btn btn-outline-secondary minus">
                  -
                </button>
  
                <input
                  type="text"
                  class="form-control text-center quantity"
                  value="1"
                  readonly
                  style="width: 60px;"
                >
  
                <button class="btn btn-outline-secondary plus">
                  +
                </button>
  
              </div>
  
            </td>
  
            <td class="subtotal fw-bold">
              $57.99
            </td>
  
            <td>
  
              <button class="btn btn-danger eliminar">
                🗑
              </button>
  
            </td>
  
          </tr>
  
          <!-- PRODUCTO 2 -->
          <tr class="producto">
  
            <td>
              Nemesis Retaliation
            </td>
  
            <td class="precio">
              189.95
            </td>
  
            <td>
  
              <div class="d-flex align-items-center gap-2">
  
                <button class="btn btn-outline-secondary minus">
                  -
                </button>
  
                <input
                  type="text"
                  class="form-control text-center quantity"
                  value="1"
                  readonly
                  style="width: 60px;"
                >
  
                <button class="btn btn-outline-secondary plus">
                  +
                </button>
  
              </div>
  
            </td>
  
            <td class="subtotal fw-bold">
              $189.95
            </td>
  
            <td>
  
              <button class="btn btn-danger eliminar">
                🗑
              </button>
  
            </td>
  
          </tr>
  
        </tbody>
  
      </table>
  
      <!-- FOOTER CARRITO -->
      <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-3">
  
        <!-- IZQUIERDA -->
        <a
          href="../productos/productos.html"
          class="btn btn-warning fw-bold"
        >
          ← Volver al inicio
        </a>
  
        <!-- DERECHA -->
        <div class="d-flex align-items-center gap-4">
  
          <h4 class="fw-bold mb-0">
            Total:
            <span id="total">
              $247.94
            </span>
          </h4>
  
          <form action="../pagina-intermedia/pagina-intermedia.html">
  
            <button
              id="btn-pago"
              class="btn btn-success fw-bold px-4"
            >
  
              Proceder al pago →
  
            </button>
  
          </form>
  
        </div>
  
      </div>
  
    </div>
  
  </main>

  <!-- FOOTER -->
  <footer class="bg-body-tertiary border-top py-4 text-center">
    <div class="container">
      <p class="text-muted small mb-0">
        Franco Ferrandi - Augusto Rodriguez - Luciano Sparta | Programación III - 2026
      </p>
    </div>
  </footer>

  <!-- JS -->
  <script src="carrito2.js"></script>

</body>
</html>
