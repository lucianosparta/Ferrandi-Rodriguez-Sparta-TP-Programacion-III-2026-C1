<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="shortcut icon" href="../images/favicon.ico" type="image/icon">
  <script src="../util/theme.js"></script>
  <title>FRS Gaming - Carrito</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-body">
  <nav class="navbar bg-body-tertiary shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2" href="../productos/productos.html">
        <img
          src="../images/icono.png"
          alt="Logo"
          width="30"
          height="30"
        />
        FRS Gaming
      </a>

      <button type="button" class="btn btn-purple btn-sm" onclick="cambiarTema()">
        <span class="material-symbols-outlined d-flex">invert_colors</span>
      </button>
    </div>
  </nav>

  <main class="container my-5 flex-grow-1">
    <h1 class="fw-bold mb-4">Carrito de compras</h1>
  
    <div id="contenedor-tabla" class="table-responsive bg-body-tertiary rounded-4 shadow-sm p-4">
      <table class="table align-middle">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tabla-carrito"></tbody>
      </table>
    </div>

    <p id="mensaje-vacio" class="text-center fw-bold fs-5 d-none">
      No hay productos en el carrito
    </p>
  
    <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-3">
      <a href="../productos/productos.html" class="btn btn-secondary fw-bold">
        Volver al inicio
      </a>
  
      <div class="d-flex align-items-center gap-4">
        <h4 class="fw-bold mb-0">
          Total:
          <span id="total">$0.00</span>
        </h4>
  
          <button id="btn-pago" class="btn btn-purple fw-bold px-4">
            Proceder al pago
          </button>
      </div>
    </div>
    <!-- MODAL CONFIRMAR -->
    <div class="modal fade" id="modalConfirmar" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Confirmar compra</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
        <div class="modal-body">
          <strong>¿Desea confirmar el pedido?</strong>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button id="confirmarCompra" class="btn btn-purple">Confirmar</button>
        </div>
      </div>
    </div>
  </div>
  </main>

  <footer class="bg-body-tertiary border-top py-4 text-center">
    <div class="container">
      <p class="text-muted small mb-0">
        Franco Ferrandi - Augusto Rodriguez - Luciano Sparta | Programación III - 2026
      </p>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script src="carrito.js"></script>
</body>
</html>
